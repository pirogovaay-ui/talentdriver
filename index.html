<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Talent Driver Route</title>
    <link rel="preload" href="assets/talent-driver-bg.svg" as="image">
    <link rel="preload" href="assets/talent-driver-final.svg" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="390" height="844" aria-label="Talent Driver Route game"></canvas>

      <button id="startButton" class="start-button" type="button"></button>
      <button id="continueButton" class="continue-button hidden" type="button"></button>

      <section class="controls" aria-label="Controls">
        <button class="control-button" type="button" data-control="left" aria-label="Left">&larr;</button>
        <button class="control-button" type="button" data-control="right" aria-label="Right">&rarr;</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
